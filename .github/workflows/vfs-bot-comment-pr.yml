name: VFS Bot - Comment on PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  comment:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@mister-meow') &&
      (
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR", "FIRST_TIME_CONTRIBUTOR"]'), github.event.comment.author_association) ||
        github.event.comment.user.login == github.event.issue.user.login
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate vfs-bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.VFS_BOT_APP_ID }}
          private-key: ${{ secrets.VFS_BOT_APP_PRIVATE_KEY }}

      # Cap external users only — OWNER/MEMBER/COLLABORATOR are exempt.
      # The job-level `if:` is broader (also admits CONTRIBUTOR/FIRST_TIME_CONTRIBUTOR
      # and the PR author); this step caps everyone the job admits except trusted insiders.
      - name: Check daily mention cap for external users
        id: rate-check
        if: ${{ !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) }}
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          USER_LOGIN: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          DAILY_CAP: "5"
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          # `gh api --paginate --jq` runs jq per page and emits one result per page,
          # so we sum across pages with awk. `+0` guarantees 0 for empty input.
          COUNT=$(gh api -X GET "repos/${REPO}/issues/comments" \
            -f since="${SINCE}" -f per_page=100 --paginate \
            --jq "[.[] | select(.user.login == \"${USER_LOGIN}\" and (.body | contains(\"@mister-meow\")))] | length" \
            | awk '{s+=$1} END {print s+0}')

          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

          if [ "${COUNT}" -gt "${DAILY_CAP}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"

            ALREADY_NOTIFIED=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f per_page=100 --paginate \
              --jq "[.[] | select(.user.type == \"Bot\" and (.body | contains(\"daily mention limit\")) and .created_at >= \"${SINCE}\")] | length" \
              | awk '{s+=$1} END {print s+0}')

            if [ "${ALREADY_NOTIFIED}" -eq 0 ]; then
              gh issue comment "${PR_NUMBER}" -R "${REPO}" --body "@${USER_LOGIN} you've hit the daily mention limit (${DAILY_CAP}/24h) for \`@mister-meow\`. Further mentions in this window will be silently ignored. Try again in 24 hours.

          ---
          mister-meow | Type \`@mister-meow\` to interact further"
            fi
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: React to comment with eyes
        if: steps.rate-check.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes 2>/dev/null || true

      - name: Get PR HEAD SHA
        id: pr-info
        if: steps.rate-check.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Run mister-meow for PR Comment
        if: steps.rate-check.outputs.exceeded != 'true'
        uses: ./.github/actions/run-claude
        env:
          MENTION_REPO: ${{ github.repository }}
          MENTION_PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          MENTION_SCRIPTS: ${{ github.workspace }}/.github/scripts/mention
          PR_REVIEW_REPO: ${{ github.repository }}
          PR_REVIEW_PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          PR_REVIEW_HEAD_SHA: ${{ steps.pr-info.outputs.head_sha }}
          PR_REVIEW_COMMENTS_DIR: /tmp/pr-review-comments
          PR_REVIEW_HELPERS_DIR: ${{ github.workspace }}/.github/scripts/pr-review
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ steps.bot-token.outputs.token }}
          trigger-phrase: "@mister-meow"
          allowed-bots: "*"
          allowed-tools: "Edit,MultiEdit,Glob,Grep,LS,Read,Write,WebSearch,WebFetch,Bash(*)"
          prompt: |
            <context>
            Repository: ${{ github.repository }}
            PR Number: #${{ steps.pr-info.outputs.pr_number }}
            PR Title: ${{ github.event.issue.title }}
            PR Author: ${{ github.event.issue.user.login }}
            Comment Author: ${{ github.event.comment.user.login }}

            The PR head branch has been checked out. The workspace is ready.
            </context>

            <user_request>
            ${{ github.event.comment.body }}
            </user_request>

            <task>
            You have been mentioned in a Pull Request comment. Understand the request, gather context, complete the task, and respond with results.
            </task>

            <constraints>
            You CAN: Read/analyze code, modify files, write code, run tests, execute commands, resolve review threads
            You CANNOT: Commit code, push changes, create branches, create pull requests
            </constraints>

            <pr_review_tools>
            For PR reviews, use the helper scripts:
            - `$PR_REVIEW_HELPERS_DIR/pr-diff.sh` - view the PR diff
            - `$PR_REVIEW_HELPERS_DIR/pr-existing-comments.sh` - see existing threads
            - `$PR_REVIEW_HELPERS_DIR/pr-comment.sh` - queue inline comments
            - `$PR_REVIEW_HELPERS_DIR/pr-review.sh` - submit a review

            For review thread management:
            - `$MENTION_SCRIPTS/gh-get-review-threads.sh` - list unresolved threads
            - `$MENTION_SCRIPTS/gh-resolve-review-thread.sh THREAD_ID "message"` - resolve a thread
            </pr_review_tools>

            <response_footer>
            Always end your comment with:

            ---
            mister-meow | Type `@mister-meow` to interact further
            </response_footer>
