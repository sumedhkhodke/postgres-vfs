<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80" />
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="240" x2="1280" y2="240" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="400" x2="1280" y2="400" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="0" y1="560" x2="1280" y2="560" />
    <line x1="160" y1="0" x2="160" y2="640" />
    <line x1="320" y1="0" x2="320" y2="640" />
    <line x1="480" y1="0" x2="480" y2="640" />
    <line x1="640" y1="0" x2="640" y2="640" />
    <line x1="800" y1="0" x2="800" y2="640" />
    <line x1="960" y1="0" x2="960" y2="640" />
    <line x1="1120" y1="0" x2="1120" y2="640" />
  </g>

  <!-- Database icon (left side) -->
  <g transform="translate(180, 200)">
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="#336791" opacity="0.8" />
    <rect x="-60" y="0" width="120" height="80" fill="#336791" opacity="0.8" />
    <ellipse cx="0" cy="80" rx="60" ry="22" fill="#2a5680" opacity="0.8" />
    <ellipse cx="0" cy="0" rx="48" ry="15" fill="#4080b0" opacity="0.2" />
    <line x1="-45" y1="28" x2="45" y2="28" stroke="white" stroke-width="1" opacity="0.2" />
    <line x1="-45" y1="48" x2="45" y2="48" stroke="white" stroke-width="1" opacity="0.2" />
    <line x1="-45" y1="68" x2="45" y2="68" stroke="white" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Arrow -->
  <g transform="translate(300, 260)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#4f6df5" stroke-width="3" opacity="0.6" />
    <polygon points="80,-8 96,0 80,8" fill="#4f6df5" opacity="0.6" />
  </g>

  <!-- Terminal window (right side) -->
  <g transform="translate(420, 170)">
    <rect width="420" height="180" rx="8" fill="#1a1a2e" />
    <rect width="420" height="28" rx="8" fill="#2d3748" />
    <rect y="20" width="420" height="8" fill="#2d3748" />
    <circle cx="16" cy="14" r="5" fill="#ef4444" />
    <circle cx="32" cy="14" r="5" fill="#fbbf24" />
    <circle cx="48" cy="14" r="5" fill="#22c55e" />
    <text x="16" y="56" font-family="monospace" font-size="13" fill="#4ade80">$</text>
    <text x="28" y="56" font-family="monospace" font-size="13" fill="#e2e8f0"> grep -rn TODO /projects</text>
    <text x="16" y="78" font-family="monospace" font-size="11" fill="#60a5fa">/projects/server.ts</text>
    <text x="195" y="78" font-family="monospace" font-size="11" fill="#94a3b8">:42: // TODO: add auth</text>
    <text x="16" y="100" font-family="monospace" font-size="13" fill="#4ade80">$</text>
    <text x="28" y="100" font-family="monospace" font-size="13" fill="#e2e8f0"> search "authentication"</text>
    <text x="16" y="122" font-family="monospace" font-size="11" fill="#fbbf24">0.92</text>
    <text x="50" y="122" font-family="monospace" font-size="11" fill="#60a5fa"> /projects/auth.ts</text>
    <text x="16" y="144" font-family="monospace" font-size="11" fill="#fbbf24">0.71</text>
    <text x="50" y="144" font-family="monospace" font-size="11" fill="#60a5fa"> /projects/middleware.ts</text>
    <text x="16" y="166" font-family="monospace" font-size="13" fill="#4ade80">$ </text>
    <text x="28" y="166" font-family="monospace" font-size="13" fill="#e2e8f0">▊</text>
  </g>

  <!-- Title -->
  <text x="640" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="white">postgres-vfs</text>

  <!-- Tagline -->
  <text x="640" y="510" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8">A PostgreSQL-backed virtual filesystem for AI agents</text>

  <!-- Bottom badges area -->
  <g transform="translate(440, 555)">
    <rect width="90" height="26" rx="4" fill="#336791" opacity="0.8" />
    <text x="45" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="white">PostgreSQL</text>
    <rect x="100" width="90" height="26" rx="4" fill="#3178C6" opacity="0.8" />
    <text x="145" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="white">TypeScript</text>
    <rect x="200" width="90" height="26" rx="4" fill="#000000" opacity="0.8" />
    <text x="245" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="white">Bun</text>
    <rect x="300" width="90" height="26" rx="4" fill="#22c55e" opacity="0.6" />
    <text x="345" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="white">MIT</text>
  </g>
</svg>
