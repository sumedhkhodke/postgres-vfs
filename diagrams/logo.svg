<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" />
      <stop offset="100%" stop-color="#336791" />
    </linearGradient>
    <linearGradient id="tabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA0E8" />
      <stop offset="100%" stop-color="#4A90D9" />
    </linearGradient>
  </defs>

  <!-- Folder tab (filesystem identity, lighter blue) -->
  <path d="M22 36 L22 27 Q22 23 26 23 L44 23 Q47 23 49 27 L53 36"
        fill="url(#tabGrad)" />

  <!-- Folder body (main shape) -->
  <rect x="18" y="36" width="84" height="30" rx="4" fill="url(#folderGrad)" />

  <!-- Database cylinder bottom (Postgres identity, darker) -->
  <ellipse cx="60" cy="66" rx="42" ry="9" fill="#336791" />
  <rect x="18" y="66" width="84" height="24" fill="#336791" />
  <ellipse cx="60" cy="90" rx="42" ry="9" fill="#2A5680" />

  <!-- Cylinder platter lines (visible data rows) -->
  <line x1="28" y1="74" x2="92" y2="74" stroke="white" stroke-width="1" opacity="0.25" />
  <line x1="28" y1="82" x2="92" y2="82" stroke="white" stroke-width="1" opacity="0.25" />

  <!-- Terminal prompt (bold, centered, white) -->
  <text x="60" y="57"
        text-anchor="middle"
        font-family="'SF Mono','Fira Code',Menlo,Consolas,monospace"
        font-size="19" font-weight="700"
        fill="white" opacity="0.95"
        letter-spacing="1">$_</text>
</svg>
